[build-system]
requires = ["uv_build>=0.11.15,<0.12"]
build-backend = "uv_build"

[project]
name = "turkish-inflation-forecasting"
version = "0.1.0"
requires-python = ">=3.14"
dependencies = [
]

[tool.uv.build-backend]
module-name = ["src"]
module-root = "src"
namespace = true

[project.scripts]
main = "src.main.__main__:main"

[dependency-groups]
dev = [
    "ruff>=0.15.13",
    "ty>=0.0.39",
]
docs = ["zensical>=0.0.43"]

[tool.ruff]
line-length = 120
target-version = "py314"
lint.select = ["E", "F", "I", "UP"]
